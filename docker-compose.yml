version: '3.9'

services:
  web:
    image: owaish19/django-app:latest
    container_name: django_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    environment:
      - DEBUG=True
      - SECRET_KEY=test
      - MYSQL_DB=djnagopipe
      - MYSQL_USER=root
      - MYSQL_PASSWORD=test@123
      - HOST=mysql
      - MYSQL_PORT=3306
      - REDIS_URL=redis://redis:6379/1

  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: test@123
      MYSQL_DATABASE: djnagopipe
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis
    container_name: redis_cache
    ports:
      - "6379:6379"

volumes:
  mysql_data: