name: Django CI
on:
  push:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports: ['6379:6379']
    env:
      SECRET_KEY: test
      DEBUG: True
      REDIS_URL: redis://localhost:6379/1
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install -r requirements.txt
    - run: python manage.py migrate
    - run: python manage.py test
